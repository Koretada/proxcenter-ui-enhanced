name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the images'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/proxcenter-frontend
  ORCHESTRATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/proxcenter-orchestrator

jobs:
  # ========================================
  # Auto-version (push to main only)
  # ========================================
  version:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.bump.outputs.skipped }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Find latest v* tag reachable from HEAD
          LATEST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tag found — starting at v1.0.0"
            NEW_VERSION="1.0.0"
          else
            echo "Latest tag: $LATEST_TAG"

            # Parse current version
            CURRENT="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            # Get commits since last tag
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || echo "")

            if [ -z "$COMMITS" ]; then
              echo "No new commits since $LATEST_TAG — skipping"
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
              echo "tag=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "--- Commits since $LATEST_TAG ---"
            echo "$COMMITS"
            echo "---"

            # Determine bump type from conventional commit prefixes
            BUMP="patch"

            if echo "$COMMITS" | grep -qiE "^.*BREAKING[ -]CHANGE|^.*!:"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!?:"; then
              BUMP="minor"
            fi

            echo "Bump type: $BUMP"

            case "$BUMP" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          NEW_TAG="v${NEW_VERSION}"
          echo "New version: $NEW_VERSION (tag: $NEW_TAG)"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.bump.outputs.skipped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  # ========================================
  # Build Frontend Image
  # ========================================
  build-frontend:
    needs: [version]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        run: |
          # Priority: version job output > tag ref > 'dev'
          if [ -n "${{ needs.version.outputs.version }}" ]; then
            echo "version=${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for Frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.resolve.outputs.version }},enable=${{ steps.resolve.outputs.version != 'dev' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ steps.resolve.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Make Frontend package public
        if: github.event_name != 'pull_request'
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/proxcenter-frontend \
            -d '{"visibility":"public"}'

  # ========================================
  # Build Orchestrator Image
  # ========================================
  build-orchestrator:
    needs: [version]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout backend repo
        uses: actions/checkout@v6
        with:
          repository: adminsyspro/proxcenter-backend
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
          path: backend
          token: ${{ secrets.ORCHESTRATOR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ needs.version.outputs.version }}" ]; then
            echo "version=${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for Orchestrator
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ORCHESTRATOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.resolve.outputs.version }},enable=${{ steps.resolve.outputs.version != 'dev' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Orchestrator
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========================================
  # Create Release
  # ========================================
  release:
    needs: [version, build-frontend, build-orchestrator]
    runs-on: ubuntu-latest
    if: |
      always() && !failure() && !cancelled() &&
      (
        (needs.version.outputs.skipped != 'true' && needs.version.outputs.tag != '') ||
        startsWith(github.ref, 'refs/tags/v')
      )
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: resolve
        run: |
          if [ -n "${{ needs.version.outputs.tag }}" ]; then
            echo "tag=${{ needs.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          generate_release_notes: true
          files: |
            install-community.sh
            install-enterprise.sh
            docker-compose.community.yml
            docker-compose.enterprise.yml
